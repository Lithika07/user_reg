<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Auth System</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    </style>
</head>
<body>

<div class="container">
  <h2>🔐 Auth System</h2>

  <!-- ── REGISTER FORM ── -->
  <div id="registerSection" class="form-section active">
    <label>Full Name *</label>
    <input type="text" id="reg-name" placeholder="John Doe" /></br>
    <span class="error-msg" id="err-name"></span>

    <label>Email *</label>
    <input type="email" id="reg-email" placeholder="john@example.com" /></br>
    <span class="error-msg" id="err-email"></span>

    <label>Password * (min 6 chars)</label>
    <input type="password" id="reg-password" placeholder="••••••" /></br>
    <span class="error-msg" id="err-password"></span>

    <label>Confirm Password *</label>
    <input type="password" id="reg-confirm" placeholder="••••••" /></br>
    <span class="error-msg" id="err-confirm"></span>

    <label>Gender</label>
    <select id="reg-gender">
      <option value="">Select Gender</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
      <option value="other">Other</option>
    </select></br>

    <label>Date of Birth</label>
    <input type="date" id="reg-dob" /></br>

    <label>Address</label>
    <input type="text" id="reg-address" placeholder="123 Main St, City" /></br>

    <button type="submit" onclick="handleRegister()">Register</button>
    <div class="message" id="reg-message"></div></br>
  </div>
  <h2>🔐 Login Form</h2>
  <!-- ── LOGIN FORM ── -->
  <div id="loginSection" class="form-section">
    <label>Email *</label>
    <input type="email" id="login-email" placeholder="john@example.com" /></br>
    <span class="error-msg" id="err-login-email"></span>

    <label>Password *</label>
    <input type="password" id="login-password" placeholder="••••••" /></br>
    <span class="error-msg" id="err-login-password"></span>

    <button type="submit" onclick="handleLogin()">Login</button>
    <div class="message" id="login-message"></div></br>
  </div>
</div>

<script>
  // ⚠️ CHANGE THIS if your backend runs on a different port
  const API_BASE = 'http://localhost:5000/api';

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'message ' + type;
  }

  // ── REGISTER ──────────────────────────────────────────────────
  async function handleRegister() {
    // Clear errors
    ['err-name','err-email','err-password','err-confirm'].forEach(id => {
      document.getElementById(id).textContent = '';
    });

    const name     = document.getElementById('reg-name').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const confirm  = document.getElementById('reg-confirm').value;

    let valid = true;

    if (!name) {
      document.getElementById('err-name').textContent = 'Name is required';
      valid = false;
    }
    if (!email || !/\S+@\S+\.\S+/.test(email)) {
      document.getElementById('err-email').textContent = 'Valid email is required';
      valid = false;
    }
    if (password.length < 6) {
      document.getElementById('err-password').textContent = 'Password must be at least 6 characters';
      valid = false;
    }
    if (password !== confirm) {
      document.getElementById('err-confirm').textContent = 'Passwords do not match';
      valid = false;
    }

    if (!valid) return;

    try {
      const res = await fetch(`${API_BASE}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();

      if (res.ok) {
        showMsg('reg-message', '✅ ' + data.message, 'success');
      } else {
        showMsg('reg-message', '❌ ' + data.message, 'error');
      }
    } catch (err) {
      showMsg('reg-message', '❌ Cannot connect to server. Is backend running?', 'error');
    }
  }

  // ── LOGIN ─────────────────────────────────────────────────────
  async function handleLogin() {
    document.getElementById('err-login-email').textContent = '';
    document.getElementById('err-login-password').textContent = '';

    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    let valid = true;

    if (!email) {
      document.getElementById('err-login-email').textContent = 'Email is required';
      valid = false;
    }
    if (!password) {
      document.getElementById('err-login-password').textContent = 'Password is required';
      valid = false;
    }

    if (!valid) return;

    try {
      const res = await fetch(`${API_BASE}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (res.ok) {
        showMsg('login-message', '✅ Login successful!', 'success');
        // Save token for future use
        localStorage.setItem('token', data.token);
      } else {
        showMsg('login-message', '❌ ' + data.message, 'error');
        document.getElementById('token-display').style.display = 'none';
      }
    } catch (err) {
      showMsg('login-message', '❌ Cannot connect to server. Is backend running?', 'error');
    }
  }
</script>

</body>
</html>
